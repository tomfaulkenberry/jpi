---
layout: default
---
<article class="page-shell">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: "Journal of Psychological Inquiry" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.lead %}
      <p class="lead">{{ page.lead }}</p>
    {% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
